name: Backend CI

on:
  push:
    branches:
      - main
      - develop
      - feature/backend-deploy
      - feature/backend-analysis
  pull_request:
    branches:
      - main
      - develop
      - feature/backend-deploy
      - feature/backend-analysis

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_MODELS_TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          
      - name: Show Python Version
        run: |
          python --version

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with Flake8
        continue-on-error: true
        run: |
          pip install flake8
          flake8 . --max-line-length=120 --ignore=E501

      - name: Run Tests
        run: |
          pytest

